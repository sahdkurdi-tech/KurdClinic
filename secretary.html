<!DOCTYPE html>
<html lang="ku" dir="rtl" data-page-title="pageTitleSecretary">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سکرتێر</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ستایلی تایبەت بە ٤ بەشە جیاوازەکە */
        .number-grid-custom {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
            gap: 12px;
            margin-bottom: 10px;
        }

        .number-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            padding: 12px 5px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: none;
            position: relative;
        }

        .number-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .number-btn.selected { transform: scale(1.1); z-index: 10; border: 3px solid #22c55e !important; box-shadow: 0 0 15px rgba(34, 197, 94, 0.6); }
        .number-btn.used { opacity: 0.4; pointer-events: none; }

        .num-main { font-size: 26px; font-weight: bold; }
        .num-sub { font-size: 15px; font-weight: bold; opacity: 0.85; margin-top: 2px; }

        /* ڕەنگەکانی ئافرەتان */
        .btn-w-consult { background: #fbcfe8; color: #831843; border: 2px solid #f472b6; } 
        .btn-w-surgery { background: #be185d; color: #ffffff; border: 2px solid #9d174d; } 

        /* ڕەنگەکانی پیاوان */
        .btn-m-consult { background: #bae6fd; color: #082f49; border: 2px solid #38bdf8; } 
        .btn-m-surgery { background: #0369a1; color: #ffffff; border: 2px solid #082f49; } 

        .section-box {
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body style="display: none;" id="secureBody">

    <div id="refreshModal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 data-i18n="refreshModalTitle" style="color: var(--warning); margin-bottom: 15px; font-size: 26px;">
                <i class="fa-solid fa-rotate-right"></i> نوێکردنەوەی سیستەم
            </h2>
            <p data-i18n="refreshModalDesc" style="font-size: 20px; margin-bottom: 10px; color: var(--text-muted); line-height: 1.5;">
                ئایا دڵنیای کە دەتەوێت نوێترین وەشان بهێنیت؟
            </p>
            <p data-i18n="refreshModalWarn" style="font-size: 16px; margin-bottom: 30px; color: var(--danger); font-weight: bold;">
                (ئاگاداری: هەموو ژمارە بەکارهاتووەکان ڕەنگیان ئاسایی دەبێتەوە)
            </p>
            <div class="grid-2">
                <button id="btnConfirmRefresh" data-i18n="btnYesRefresh" class="btn-primary" style="background: var(--success);">
                    بەڵێ، نوێی بکەوە ✔️
                </button>
                <button onclick="document.getElementById('refreshModal').classList.add('hidden')" data-i18n="btnNoCancel" class="btn-primary" style="background: var(--danger);">
                    پەشیمان بوونەوە ❌
                </button>
            </div>
        </div>
    </div>

    <div class="container" style="max-width: 1300px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 data-i18n="secDashboardTitle" style="margin-bottom: 0; padding-bottom: 0;"><i class="fa-solid fa-desktop"></i> سەرپەرشتیاری نۆرە</h1>
            
            <div style="display: flex; gap: 15px;">
<div class="modern-lang-switcher">
    <button class="lang-btn" data-lang="ku">کوردی</button>
    <button class="lang-btn" data-lang="ar">عربي</button>
    <button class="lang-btn" data-lang="en">EN</button>
</div>
                <button id="btnRefresh" data-i18n="btnRefresh" style="background: var(--warning); width: auto; padding: 12px 20px; font-size: 16px;">
                    <i class="fa-solid fa-rotate-right"></i> نوێکردنەوە
                </button>
                <button id="btnLogout" data-i18n="logout" style="background: var(--danger); width: auto; padding: 12px 20px; font-size: 16px;">
                    <i class="fa-solid fa-right-from-bracket"></i> دەرچوون
                </button>
            </div>
        </div>
        
        <h2 data-i18n="womenSection" style="color: #be185d; border-bottom: 3px solid #fbcfe8; padding-bottom: 10px; margin-bottom: 20px;"><i class="fa-solid fa-person-dress"></i> بەشی ئافرەتان</h2>
        <div class="section-box" style="background: #fdf2f8; border: 2px solid #fbcfe8;">
            <h3 data-i18n="consultLabelW" style="color: #9d174d; margin-bottom: 15px;"><i class="fa-solid fa-eye"></i>بینین</h3>
            <div id="gridWomenConsult" class="number-grid-custom"></div>
            
            <h3 data-i18n="surgeryLabelW" style="color: #831843; margin-bottom: 15px; margin-top: 30px;"><i class="fa-solid fa-syringe"></i>نەشتەرگەری</h3>
            <div id="gridWomenSurgery" class="number-grid-custom"></div>
        </div>

        <h2 data-i18n="menSection" style="color: #0369a1; border-bottom: 3px solid #bae6fd; padding-bottom: 10px; margin-bottom: 20px; margin-top: 40px;"><i class="fa-solid fa-person"></i> بەشی پیاوان</h2>
        <div class="section-box" style="background: #f0f9ff; border: 2px solid #bae6fd;">
            <h3 data-i18n="consultLabelM" style="color: #075985; margin-bottom: 15px;"><i class="fa-solid fa-eye"></i>بینین</h3>
            <div id="gridMenConsult" class="number-grid-custom"></div>
            
            <h3 data-i18n="surgeryLabelM" style="color: #082f49; margin-bottom: 15px; margin-top: 30px;"><i class="fa-solid fa-syringe"></i>نەشتەرگەری</h3>
            <div id="gridMenSurgery" class="number-grid-custom"></div>
        </div>

        <div style="background: #ffffff; padding: 25px; border-radius: 16px; border: 2px solid #e2e8f0; box-shadow: var(--shadow-md); position: sticky; bottom: 20px; z-index: 100;">
            <div style="text-align: center; margin-bottom: 20px;">
                <span id="selectedDisplay" data-i18n="pleaseSelect" style="font-size: 20px; font-weight: bold; color: var(--text-muted); background: #f1f5f9; padding: 12px 25px; border-radius: 12px; display: inline-block;">
                    تکایە ژمارەیەک لە سەرەوە هەڵبژێرە...
                </span>
            </div>
            
            <button id="btnSend" data-i18n="btnSendPatient" style="width: 100%; background: var(--success); color: white; padding: 18px; font-size: 22px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; transition: 0.3s; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);">
                <i class="fa-solid fa-paper-plane"></i> ناردنی نەخۆش بۆ دکتۆر
            </button>
            <p id="msg" style="text-align: center; margin-top: 15px; font-size: 18px; font-weight: bold;"></p>
        </div>
        
    </div>
    <script type="module" src="js/secretary.js"></script>
</body>
</html>
